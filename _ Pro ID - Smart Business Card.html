.wp-core-ui .button-secondary {

    cursor: pointer;  
    position: relative;  
    overflow: hidden;  
    margin-bottom: 5px;  
    text-transform: uppercase;  
}  

.wp-core-ui .button:hover,  
.wp-core-ui .button-secondary:hover {  
    background: linear-gradient(135deg, #1e90ff, #00bfff, #1c86ee, #00ced1);  
    background-size: 300% 100%;  
    background-position: 100% 0;  
    box-shadow:  
        inset 0 1px 0 rgba(255, 255, 255, 0.9),  
        0 6px 12px rgba(30, 144, 255, 0.8);  
}  

.wp-core-ui .button::before {  
    content: "";  
    position: absolute;  
    top: -40%;  
    left: -50%;  
    width: 200%;  
    height: 200%;  
    background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), transparent 60%);  
    transform: rotate(45deg);  
    pointer-events: none;  
    transition: opacity 0.5s ease;  
    opacity: 0;  
}  

.wp-core-ui .button:hover::before {  
    opacity: 0.6;  
}  


.wp-core-ui #login .button-primary,

      inset 0 1px 0 rgba(255, 255, 255, 0.6),

    text-transform: uppercase;  
    transition: background-position 0.5s ease, box-shadow 0.3s ease;

.wp-core-ui #login .button-primary,  
.wp-core-ui #login .two-factor-email-resend .button,  
.wp-core-ui #login .wp-generate-pw {  
    color: #fff;  
    border: 2px solid transparent;  /* Make the base border transparent */  
    background: linear-gradient(135deg, #d93025, #ff4436, #b22222, #ff6347);  
    background-size: 300% 100%;  
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6),  
                0 4px 8px rgba(217, 48, 37, 0.6);  
    height: auto;  
    line-height: 20px;  
    padding: 15px;  
    float: none;  
    width: 100%;  
    border-radius: 15px;  
    font-weight: 700;  
    cursor: pointer;  
    position: relative;  
    overflow: visible; /* Needed for the glow to show outside */  
    margin-bottom: 5px;  
    text-transform: uppercase;  
    transition: background-position 0.5s ease, box-shadow 0.3s ease;  
    z-index: 0;  
}  

/* Pseudo-element for the animated fiery border */  
.wp-core-ui #login .button-primary::before,  
.wp-core-ui #login .two-factor-email-resend .button::before,  
.wp-core-ui #login .wp-generate-pw::before {  
    content: "";  
    position: absolute;  
    top: -4px;  
    left: -4px;  
    right: -4px;  
    bottom: -4px;  
    border-radius: 20px;  
    background: linear-gradient(  
      45deg,  
      #ff4500,  
      #ff8c00,  
      #ff4500,  
      #ff6347,  
      #ff4500,  
      #ff8c00,  
      #ff4500  
    );  
    background-size: 400% 400%;  
    animation: fire-border 3s linear infinite;  
    z-index: -1;  
    filter: drop-shadow(0 0 6px #ff4500);  
}  

/* Keep normal hover effect but no background change */  
.wp-core-ui #login .button-primary:hover,  
.wp-core-ui #login .two-factor-email-resend .button:hover,  
.wp-core-ui #login .wp-generate-pw:hover {  
    background-position: 100% 0;  
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9),  
                0 6px 12px rgba(217, 48, 37, 0.8);  
}  

/* Keyframe animation for the fiery border running effect */  
@keyframes fire-border {  
    0% {  
        background-position: 0% 50%;
